name: "Update AUR"

on:
    push:
    schedule:
        - cron: "0 0 * * 6"
    workflow_dispatch:

jobs:
    generate-matrix:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Generate matrix
              id: gen-matrix
              run: echo "packages=$(ls */ -d | cut -f1 -d'/' | jq -R . | jq -cs .)" >> "$GITHUB_OUTPUT"
        outputs:
            packages: ${{ steps.gen-matrix.outputs.packages }}

    aur:
        runs-on: ubuntu-latest
        needs: generate-matrix
        strategy:
            fail-fast: false
            matrix:
                pkgname: ${{ fromJson(needs.generate-matrix.outputs.packages) }}

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install SSH key
              uses: shimataro/ssh-key-action@v2
              with:
                  key: ${{ secrets.SSH_KEY }}
                  known_hosts: ${{ secrets.KNOWN_HOSTS }}

            - name: Check PKGBUILD
              if: ${{ matrix.pkgname != 'yansu' }}
              id: build-test
              uses: ouuan/pkgbuild-action@master
              with:
                  path: ${{ matrix.pkgname }}

            - name: Check yansu PKGBUILD
              if: ${{ matrix.pkgname == 'yansu' }}
              run: |
                  docker run --rm \
                    -e HOST_UID="$(id -u)" \
                    -e HOST_GID="$(id -g)" \
                    -v "$PWD:/workspace" \
                    archlinux:base-devel \
                    bash -lc '
                      set -euo pipefail
                      pacman-key --init
                      pacman --noconfirm -Syu --needed namcap
                      if ! getent group "$HOST_GID" > /dev/null; then
                        groupadd -g "$HOST_GID" build
                      fi
                      useradd -m -u "$HOST_UID" -g "$HOST_GID" build
                      workdir="$(mktemp -d)"
                      cp -a /workspace/yansu/. "$workdir/"
                      chown -R build:"$HOST_GID" "$workdir"
                      cd "$workdir"
                      runuser -u build -- makepkg --noconfirm --verifysource
                      runuser -u build -- bash -lc "makepkg --printsrcinfo > .SRCINFO"
                      cp .SRCINFO /workspace/yansu/.SRCINFO
                      chown "$HOST_UID:$HOST_GID" /workspace/yansu/.SRCINFO
                      runuser -u build -- namcap PKGBUILD || true
                    '

            - uses: actions/upload-artifact@v4
              if: ${{ matrix.pkgname != 'yansu' }}
              with:
                  name: ${{ matrix.pkgname }}-${{ github.run_id }}
                  path: ./${{ matrix.pkgname }}/*.pkg.tar.zst

            - name: Clone AUR and update
              run: |
                  message="$(git log -n1 --pretty='%B' "${{ matrix.pkgname }}")"
                  git clone ssh://aur@aur.archlinux.org/${{ matrix.pkgname }}.git ../aur
                  shopt -s dotglob
                  shopt -s extglob
                  rm ../aur/!(.git|.|..) || true
                  cp -r ${{ matrix.pkgname }}/*  ../aur
                  cd ../aur
                  git config user.name ${{ secrets.AUR_USER }}
                  git config user.email ${{ secrets.AUR_EMAIL }}
                  git add -A
                  escape() {
                    local content="$1"
                    content="${content//'%'/'%25'}"
                    content="${content//$'\n'/'%0A'}"
                    content="${content//$'\r'/'%0D'}"
                    echo "$content"
                  }
                  git diff-index @ --exit-code --quiet || ( git commit -m "Update from GitHub Actions: $message

                  https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}" && echo "::warning::Pushed to AUR:%0A$(escape "$message")" )
                  git push
